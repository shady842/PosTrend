name: postrend_pos
description: PosTrend Flutter POS shell (Android tablet/mobile)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2
  http: ^1.2.2
  uuid: ^4.5.1
  socket_io_client: ^3.1.4
  esc_pos_utils_plus: ^2.0.4
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
