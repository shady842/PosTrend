apiVersion: apps/v1
kind: Deployment
metadata:
  name: postrend-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: postrend-api
  template:
    metadata:
      labels:
        app: postrend-api
    spec:
      containers:
        - name: api
          image: postrend/api:phase1
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
---
apiVersion: v1
kind: Service
metadata:
  name: postrend-api
spec:
  selector:
    app: postrend-api
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
