name: Build POS Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "apps/pos_flutter/**"
      - ".github/workflows/build-pos-flutter-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pos_flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter test
        run: flutter test

      - name: Build release APK
        env:
          POS_API_BASE_URL: ${{ secrets.POS_API_BASE_URL }}
        run: |
          if [ -n "${POS_API_BASE_URL}" ]; then
            flutter build apk --release --dart-define=API_BASE_URL="${POS_API_BASE_URL}"
          else
            flutter build apk --release
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: postrend-pos-apk
          path: apps/pos_flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 90
